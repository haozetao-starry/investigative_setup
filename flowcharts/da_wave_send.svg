<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" font-family="SimHei, Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2d5a87"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="650" height="300" fill="#f8fafc" rx="6"/>

  <rect x="0" y="0" width="650" height="42" rx="6" fill="url(#titleGrad)"/>
  <rect x="0" y="32" width="650" height="10" fill="url(#titleGrad)"/>
  <text x="325" y="27" text-anchor="middle" fill="white" font-size="15" font-weight="bold">da_wave_send — DAC发送接口 流程图</text>

  <!-- 输入 -->
  <rect x="40" y="62" width="220" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="150" y="83" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">输入信号</text>
  <text x="150" y="99" text-anchor="middle" fill="#1e40af" font-size="10">da_src_data [7:0]</text>
  <text x="150" y="113" text-anchor="middle" fill="#1e40af" font-size="9">(顶层选择: dds_wave或biquad_wave)</text>

  <line x1="260" y1="89" x2="310" y2="89" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 核心逻辑 -->
  <rect x="315" y="62" width="280" height="55" rx="6" fill="white" stroke="#333" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="455" y="83" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="bold">核心逻辑</text>
  <text x="455" y="99" text-anchor="middle" fill="#475569" font-size="10">da_clk = ~clk_reg  (时钟反相)</text>
  <text x="455" y="113" text-anchor="middle" fill="#475569" font-size="10">da_data = rd_data (直通)</text>

  <line x1="455" y1="117" x2="455" y2="145" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 输出 -->
  <rect x="350" y="146" width="210" height="40" rx="6" fill="#22c55e" stroke="#15803d" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="455" y="164" text-anchor="middle" fill="white" font-size="12" font-weight="bold">输出至外部DAC</text>
  <text x="455" y="179" text-anchor="middle" fill="white" font-size="10">da_clk + da_data[7:0]</text>

  <!-- 时序示意 -->
  <rect x="40" y="200" width="570" height="85" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="325" y="218" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">时钟反相设计原理</text>
  <text x="60" y="238" fill="#334155" font-size="10">系统时钟 clk:      ──┐    ┌──    ──┐    ┌──</text>
  <text x="60" y="255" fill="#334155" font-size="10">DAC时钟 da_clk:  ──  └────┘    ──  └────┘  (clk反相)</text>
  <text x="60" y="272" fill="#334155" font-size="10">目的: da_data在clk上升沿更新 → 在da_clk(原clk下降沿)上升沿时已稳定 → DAC采样窗口有充足建立时间</text>

  <text x="40" y="295" fill="#888" font-size="9">源文件: src/dac_send/da_wave_send.v | 兼容DA9708及类似并行DAC</text>
</svg>