<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 780" font-family="SimHei, Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2d5a87"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="880" height="780" fill="#f8fafc" rx="6"/>

  <rect x="0" y="0" width="880" height="42" rx="6" fill="url(#titleGrad)"/>
  <rect x="0" y="32" width="880" height="10" fill="url(#titleGrad)"/>
  <text x="440" y="27" text-anchor="middle" fill="white" font-size="15" font-weight="bold">acq_ctrl — 主控状态机 (6-State FSM) 状态转换图</text>

  <!-- ===== 6个状态节点 ===== -->

  <!-- ST_IDLE (0) -->
  <rect x="340" y="58" width="200" height="55" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="80" text-anchor="middle" fill="#4338ca" font-size="13" font-weight="bold">ST_IDLE (0)</text>
  <text x="440" y="96" text-anchor="middle" fill="#4338ca" font-size="10">等待扫频步进同步</text>
  <text x="440" y="109" text-anchor="middle" fill="#6b7280" font-size="9">sweep_step_sync触发</text>

  <!-- IDLE → PULSE_ACQ -->
  <line x1="440" y1="113" x2="440" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="130" fill="#333" font-size="9">!mimic_mode &amp;&amp;</text>
  <text x="460" y="142" fill="#333" font-size="9">sweep_step_sync</text>

  <!-- ST_PULSE_ACQ (1) -->
  <rect x="340" y="143" width="200" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="160" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">ST_PULSE_ACQ (1)</text>
  <text x="440" y="175" text-anchor="middle" fill="#1e40af" font-size="10">ad_acq_start=1 启动ADC</text>

  <line x1="440" y1="183" x2="440" y2="205" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ST_WAIT_BUF (2) -->
  <rect x="340" y="206" width="200" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="226" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">ST_WAIT_BUF (2)</text>
  <text x="440" y="242" text-anchor="middle" fill="#1e40af" font-size="10">等待ad_buf_full=1</text>
  <text x="440" y="255" text-anchor="middle" fill="#6b7280" font-size="9">→ fft_start_en=1</text>

  <line x1="440" y1="254" x2="440" y2="278" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ST_WAIT_FFT (3) -->
  <rect x="340" y="280" width="200" height="48" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="300" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">ST_WAIT_FFT (3)</text>
  <text x="440" y="316" text-anchor="middle" fill="#92400e" font-size="10">等待fft_done=1</text>
  <text x="440" y="329" text-anchor="middle" fill="#6b7280" font-size="9">→ store_en=1, rls_en=1</text>

  <line x1="440" y1="328" x2="440" y2="353" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ST_WAIT_RLS (4) -->
  <rect x="340" y="355" width="200" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="375" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">ST_WAIT_RLS (4)</text>
  <text x="440" y="391" text-anchor="middle" fill="#1e40af" font-size="10">等待rls_done=1</text>
  <text x="440" y="407" text-anchor="middle" fill="#6b7280" font-size="9">判断frame_is_last</text>

  <line x1="440" y1="415" x2="440" y2="448" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 分支菱形 -->
  <polygon points="440,451 530,483 440,515 350,483" fill="#fef3c7" stroke="#d97706" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="440" y="481" text-anchor="middle" fill="#92400e" font-size="10" font-weight="bold">frame_is_last?</text>

  <!-- 否 → 回到 IDLE -->
  <line x1="350" y1="483" x2="110" y2="483" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="230" y="476" text-anchor="middle" fill="#16a34a" font-size="9">否 → 回到IDLE (下一频点)</text>
  <line x1="110" y1="483" x2="110" y2="85" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="110" y1="85" x2="335" y2="85" stroke="#16a34a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 是 → 判断MSE -->
  <line x1="440" y1="515" x2="440" y2="542" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="532" fill="#dc2626" font-size="9">是</text>

  <!-- MSE判断菱形 -->
  <polygon points="440,545 540,580 440,615 340,580" fill="#fef3c7" stroke="#d97706" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="440" y="578" text-anchor="middle" fill="#92400e" font-size="10" font-weight="bold">MSE &gt; 阈值?</text>

  <!-- MSE大 → 重扫 -->
  <line x1="340" y1="580" x2="60" y2="580" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="573" text-anchor="middle" fill="#dc2626" font-size="9">是(模型不合格)</text>
  <rect x="55" y="558" width="130" height="44" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.3"/>
  <text x="120" y="577" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="bold">清除并重扫</text>
  <text x="120" y="593" text-anchor="middle" fill="#991b1b" font-size="9">store_clear=1</text>
  <line x1="120" y1="558" x2="120" y2="85" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="85" x2="335" y2="85" stroke="#dc2626" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MSE小 → 分类 -->
  <line x1="440" y1="615" x2="440" y2="642" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="632" fill="#16a34a" font-size="9">否(模型合格)</text>

  <!-- ST_WAIT_CLASSIFY (5) -->
  <rect x="340" y="645" width="200" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="665" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">ST_WAIT_CLASSIFY (5)</text>
  <text x="440" y="681" text-anchor="middle" fill="#15803d" font-size="10">等待classifier_done=1</text>
  <text x="440" y="694" text-anchor="middle" fill="#6b7280" font-size="9">→ mimic_mode=1</text>

  <line x1="440" y1="695" x2="440" y2="725" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="725" width="200" height="30" rx="15" fill="#22c55e" filter="url(#shadow)"/>
  <text x="440" y="745" text-anchor="middle" fill="white" font-size="12" font-weight="bold">进入复现模式</text>
  <line x1="440" y1="725" x2="440" y2="85" stroke="#16a34a" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="440" y1="85" x2="540" y2="85" stroke="#16a34a" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- 右侧表格说明 -->
  <rect x="630" y="58" width="235" height="430" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="747" y="78" text-anchor="middle" fill="#475569" font-size="12" font-weight="bold">自适应采样分频</text>
  <line x1="645" y1="86" x2="850" y2="86" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="645" y="106" fill="#334155" font-size="10" font-family="monospace">f_word &gt;= 8,589,934</text>
  <text x="800" y="106" fill="#2563eb" font-size="10">smp_div=0</text>
  <text x="645" y="124" fill="#334155" font-size="10" font-family="monospace">f_word &gt;= 858,993</text>
  <text x="800" y="124" fill="#2563eb" font-size="10">smp_div=9</text>
  <text x="645" y="142" fill="#334155" font-size="10" font-family="monospace">f_word &gt;= 85,899</text>
  <text x="800" y="142" fill="#2563eb" font-size="10">smp_div=99</text>
  <text x="645" y="160" fill="#334155" font-size="10" font-family="monospace">否则</text>
  <text x="800" y="160" fill="#2563eb" font-size="10">smp_div=999</text>

  <text x="747" y="200" text-anchor="middle" fill="#475569" font-size="12" font-weight="bold">输出信号列表</text>
  <line x1="645" y1="208" x2="850" y2="208" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="645" y="226" fill="#334155" font-size="10">ad_acq_start → ADC启动</text>
  <text x="645" y="244" fill="#334155" font-size="10">ad_smp_div[15:0] → 采样分频</text>
  <text x="645" y="262" fill="#334155" font-size="10">fft_start_en → FFT启动</text>
  <text x="645" y="280" fill="#334155" font-size="10">rls_start_en → RLS启动</text>
  <text x="645" y="298" fill="#334155" font-size="10">store_result_en → 存储使能</text>
  <text x="645" y="316" fill="#334155" font-size="10">classify_start → 分类启动</text>
  <text x="645" y="334" fill="#334155" font-size="10">store_clear → 清除结果</text>
  <text x="645" y="352" fill="#334155" font-size="10">sweep_restart → 重新扫频</text>
  <text x="645" y="370" fill="#334155" font-size="10">mimic_mode → 复现模式</text>
  <text x="645" y="388" fill="#334155" font-size="10">model_valid → 模型有效</text>

  <text x="747" y="430" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">参数</text>
  <text x="645" y="450" fill="#334155" font-size="10">STOP_WORD = 858,993 (~10kHz)</text>
  <text x="645" y="468" fill="#334155" font-size="10">RLS_ERR_THRESHOLD = 26,214,400</text>

  <text x="747" y="770" text-anchor="middle" fill="#888" font-size="9">源文件: src/adc_acq/acq_ctrl.v</text>
</svg>